<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Prediction</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        text-align: center;
        width: 320px;
    }

    h2 {
        color: #333;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        padding: 10px 20px;
        background: #2196F3;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #1976D2;
    }

    #result {
        margin-top: 20px;
        font-size: 18px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>🌤 Weather Prediction</h2>

    <input type="text" id="city" placeholder="Enter city name">

    <button onclick="predictWeather()">Check Weather</button>

    <div id="result"></div>
</div>

<script>
function predictWeather() {
    const city = document.getElementById("city").value.trim();
    const result = document.getElementById("result");

    if(city === ""){
        result.innerHTML = "<p style='color:red;'>Please enter a city name.</p>";
        return;
    }

    // Sample weather prediction
    const weather = ["Sunny ☀️", "Cloudy ☁️", "Rainy 🌧️", "Stormy ⛈️", "Snowy ❄️"];
    const randomWeather = weather[Math.floor(Math.random() * weather.length)];

    const temperature = Math.floor(Math.random() * 15) + 20;

    result.innerHTML = `
        <h3>${city}</h3>
        <p><strong>Prediction:</strong> ${randomWeather}</p>
        <p><strong>Temperature:</strong> ${temperature}°C</p>
    `;
}
</script>

</body>
</html>
